image: rust:trixie

before_script:
  - apt-get update -y
  - apt-get install -y curl build-essential gcc-arm-linux-gnueabihf
  - printf '[target.armv7-unknown-linux-gnueabihf]\nlinker = "arm-linux-gnueabihf-gcc"\n' > /usr/local/cargo/config.toml
  - rustup target add armv7-unknown-linux-gnueabihf

build:
  stage: build
  script:
    - cargo build --target armv7-unknown-linux-gnueabihf --release
    - rm -rf artifacts && mkdir -p artifacts
    - mv target/armv7-unknown-linux-gnueabihf/release/victron-nut artifacts/victron-nut-armv7
  only:
    - master
  tags:
    - linux
  artifacts:
    paths:
      - artifacts/*
